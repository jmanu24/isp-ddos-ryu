<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>

<style>

body{
    font-family:Arial;
    margin:20px;
}

.card{
    border:1px solid #ccc;
    padding:10px;
    margin:10px;
}

#topology{
    width:100%;
    height:400px;
    border:1px solid #ccc;
}

</style>

</head>

<body>

<h1>ISP DDoS Dashboard</h1>

<h2>Topologia</h2>

<div id="topology"></div>

<h2>Switches</h2>

<div id="switches"></div>

<h2>Eventos</h2>

<div id="events"></div>

<h2>Ataques</h2>

<div id="attacks"></div>

<script>

const socket = io();

const topologyNodes = new vis.DataSet([]);
const topologyEdges = new vis.DataSet([]);

const topologyNetwork = new vis.Network(
    document.getElementById("topology"),
    { nodes: topologyNodes, edges: topologyEdges },
    {
        groups: {
            switch: { shape: "box", color: { background: "#eef", border: "#88a" } },
            host: { shape: "ellipse", color: { background: "#efe", border: "#8a8" } }
        },
        nodes: {
            shape: "box",
            color: { background: "#eef", border: "#88a" }
        },
        edges: {
            color: "#888"
        },
        physics: { stabilization: true }
    }
);

function renderTopology(topology) {

    if (!topology) return;

    topologyNodes.clear();
    topologyEdges.clear();

    topologyNodes.add(
        topology.nodes.map(
            n => ({ id: n.id, label: n.label || n.id, group: n.group || "switch" })
        )
    );

    topologyEdges.add(
        topology.links.map(
            (l, i) => ({ id: i, from: l.source, to: l.target })
        )
    );
}

// Initial paint from REST, in case the page loads before the first
// socket "state_update" event arrives.
fetch("/api/topology")
    .then(r => r.json())
    .then(renderTopology)
    .catch(() => {});

socket.on(
    "state_update",
    data => {

        renderTopology(data.topology);

        document.getElementById(
            "switches"
        ).innerHTML =
        data.switches.map(
            s => `
            <div class="card">
            SW ${s.dpid}<br>
            Byte/s: ${s.byte_rate}<br>
            Packet/s: ${s.packet_rate}
            </div>
            `
        ).join("");

        document.getElementById(
            "events"
        ).innerHTML =
        data.events.map(
            e => `
            <div>
            ${e.timestamp}
            -
            ${e.message}
            </div>
            `
        ).join("");

        document.getElementById(
            "attacks"
        ).innerHTML =
        data.attacks.map(
            a => `
            <div style="color:red">
            SW ${a.switch}
            Byte/s ${a.byte_rate}
            Packet/s ${a.packet_rate}
            </div>
            `
        ).join("");
    }
);

</script>

</body>
</html>
